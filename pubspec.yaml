name: libero360
description: "Libero360 - Análisis y Gestión de Voleibol con estadísticas en tiempo real"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^11.0.0

  # Base de datos local - Sembast (web + nativo)
  sembast: ^3.8.7
  sembast_web: ^2.4.4+1
  
  # Directorios
  path_provider: ^2.1.2
  
  # Gestión de estado (MVVM)
  provider: ^6.1.1
  
  # Gráficos
  fl_chart: ^0.66.2
  
  # Utilidades
  intl: ^0.19.0
  
  # Exportación
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_libero.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/images/logo_libero.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
